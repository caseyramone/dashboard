<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Casey Ramone Start Page</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');

  body {
    background-color: #000000;
    color: #ff3333;
    font-family: 'Roboto', sans-serif;
    text-align: center;
    margin: 0;
    padding-top: 80px;
  }

  h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 4em;
    margin-bottom: 25px;
    color: #cc2222;
    text-shadow: 2px 2px 6px #000;
  }

  #clock {
    font-family: 'UnifrakturCook', cursive;
    font-size: 1.8em;
    margin-bottom: 35px;
    color: #cc2222;
    line-height: 1.4;
  }

  form {
    margin-bottom: 40px;
  }

  input[type="text"] {
    padding: 10px 15px;
    font-size: 1em;
    width: 300px;
    border: 2px solid #ff3333;
    border-radius: 4px;
    background-color: #111;
    color: #ff3333;
    font-family: 'Roboto', sans-serif;
  }

  input[type="submit"] {
    padding: 10px 20px;
    font-size: 1em;
    border: 2px solid #ff3333;
    border-radius: 4px;
    background-color: #111;
    color: #ff3333;
    font-family: 'Roboto', sans-serif;
    cursor: pointer;
    margin-left: 5px;
    transition: all 0.2s ease;
  }

  input[type="submit"]:hover {
    background-color: #ff1111;
    color: #fff;
    border-color: #ff3333;
  }

  .links {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .links a {
    margin: 10px 0;
    font-size: 1.5em;
    color: #ff3333;
    text-decoration: none;
    transition: all 0.2s ease;
  }

  .links a:hover {
    color: #fff;
    text-shadow: 0 0 8px #ff3333;
  }

  .divider {
    height: 1px;
    width: 60%;
    background-color: #ff1111;
    margin: 30px auto;
    opacity: 0.4;
  }

  .divider-bottom {
    height: 1px;
    width: 50%;
    background-color: #cc2222;
    margin: 20px auto;
    opacity: 0.3;
  }

</style>
</head>

<body>

<h1>Welcome</h1>

<div id="clock"></div>

<form action="https://www.google.com/search" method="get" target="_blank">
  <input type="text" name="q" placeholder="Search...">
  <input type="submit" value="Go">
</form>

<div class="divider"></div>

<div class="links">
  <a href="https://google.com">Google</a>
  <a href="https://youtube.com">YouTube</a>
  <a href="https://chatgpt.com">ChatGPT</a>
  <a href="https://flowgpt.com">FlowGPT</a>
  <a href="https://github.com">GitHub</a>
</div>

<div class="divider-bottom"></div>

<script>
function updateClock() {

  const now = new Date();

  const day = now.getDate();

  const daySuffix = (d) => {
    if (d > 3 && d < 21) return 'th';
    switch (d % 10) {
      case 1: return 'st';
      case 2: return 'nd';
      case 3: return 'rd';
      default: return 'th';
    }
  };

  const monthNames = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
  ];

  const year = now.getFullYear();

  let hours = now.getHours();
  const minutes = now.getMinutes().toString().padStart(2,'0');

  const period = hours >= 12 ? 'PM' : 'AM';
  const hour12 = hours % 12 === 0 ? 12 : hours % 12;

  const timeStr = `${hour12}:${minutes} ${period}`;
  const dateStr = `The ${day}${daySuffix(day)} of ${monthNames[now.getMonth()]}, ${year}`;

  document.getElementById("clock").innerHTML = `${timeStr}<br>${dateStr}`;
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
